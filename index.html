<!doctype html>
<html>
  <head>
      <meta charset="utf-8" />
      <meta http-equiv="X-UA-Compatible" content="IE=edge" />
      <script src="https://aframe.io/releases/1.0.4/aframe.min.js"></script>
      <script src="https://unpkg.com/aframe-look-at-component@0.8.0/dist/aframe-look-at-component.min.js"></script>
      <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-nft.js"></script>
      <script src="https://raw.githack.com/donmccurdy/aframe-extras/master/dist/aframe-extras.loaders.min.js"></script>
  </head>

  <body style="margin: 0; overflow: hidden;">
    <a-scene
      renderer="logarithmicDepthBuffer: true;"
      vr-mode-ui="enabled: false"
      loading-screen="enabled: false;"
      arjs="sourceType: webcam; debugUIEnabled: false;">
      <a-assets>
        <a-asset-item
          id="animated-asset"
          src="assets/asset.glb">
        </a-asset-item>
      </a-assets>

      <!-- 石垣 -->
      <a-entity
        look-at="[gps-camera]"
        gps-entity-place="latitude: 34.506948; longitude: -224.374969;">
          <a-entity
            gltf-model="#animated-asset"
            scale-to-width="width: 3"
            animation-mixer="loop: repeat"
            slow-spin="speed: 45">
          </a-entity>
      </a-entity>

      <!-- 機械 -->
      <a-entity
        look-at="[gps-camera]"
        gps-entity-place="latitude: 34.506945; longitude: -224.374968;">
          <a-entity
            gltf-model="#animated-asset"
            scale-to-width="width: 3"
            animation-mixer="loop: repeat"
            slow-spin="speed: 45">
          </a-entity>
      </a-entity>

      <!-- 公園横小径 -->
      <a-entity
        look-at="[gps-camera]"
        gps-entity-place="latitude: 34.506233; longitude: -224.374615;">
          <a-entity
            gltf-model="#animated-asset"
            scale-to-width="width: 3"
            animation-mixer="loop: repeat"
            slow-spin="speed: 45">
          </a-entity>
      </a-entity>

      <a-camera gps-camera rotation-reader></a-camera>

    </a-scene>
    <script>
      AFRAME.registerComponent('scale-to-width', {
        schema: { width: { type: 'number', default: 3 } },

        init: function () {
          this.el.addEventListener('model-loaded', () => {
            const obj = this.el.getObject3D('mesh');
            if (!obj) return;

            const box = new THREE.Box3().setFromObject(obj);
            const size = new THREE.Vector3();
            box.getSize(size);

            if (size.x <= 0) return;

            const factor = this.data.width / size.x;
            this.el.object3D.scale.set(factor, factor, factor);
          });
        }
      });

      AFRAME.registerComponent('slow-spin', {
        schema: {
          speed: { type: 'number', default: 45 }
        },

        tick: function (time, timeDelta) {
          const dt = timeDelta / 1000;
          this.el.object3D.rotation.y += THREE.MathUtils.degToRad(this.data.speed * dt);
        }
      });
    </script>
  </body>
</html>
